<!DOCTYPE html>
<html>
<head>
<title>BlueRoute Shipment Manager</title>

<script src="auth.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

.topbar{
background:#0f172a;
color:white;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
font-size:13px;
text-align:left;
}

.logout-btn{
background:#dc3545;
color:white;
border:none;
padding:8px 14px;
border-radius:4px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="topbar">
<div>BlueRoute Shipment Manager</div>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">

<h2>Shipments</h2>

<table id="shipmentTable">

<thead>
<tr>
<th>Tracking</th>
<th>Origin</th>
<th>Destination</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

const API="https://blueroute-api-production-e23a.up.railway.app";

async function loadShipments(){

const token=sessionStorage.getItem("br_token");

const res=await fetch(API+"/api/admin/shipments",{
headers:{
authorization:token
}
});

const data=await res.json();

const tbody=document.querySelector("#shipmentTable tbody");

tbody.innerHTML="";

data.forEach(s=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${s.tracking}</td>
<td>${s.origin}</td>
<td>${s.destination}</td>
<td>${s.status}</td>
`;

tbody.appendChild(tr);

});

}

window.onload=loadShipments;

</script>

</body>
</html>
