<!DOCTYPE html>
<html>
<head>
  <title>Shipment Update Panel</title>
  <style>
    body {
      font-family: Arial;
      background:#f4f6f8;
      padding:40px;
    }
    .panel {
      max-width:700px;
      background:white;
      padding:25px;
      border-radius:8px;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
    }
    input, select, textarea {
      width:100%;
      padding:10px;
      margin-bottom:12px;
      border:1px solid #ccc;
    }
    button {
      background:#28a745;
      color:white;
      border:none;
      padding:14px;
      width:100%;
      font-size:16px;
      cursor:pointer;
    }
    #result {
      margin-top:20px;
      font-weight:bold;
      color:green;
    }
  </style>
</head>
<body>

<!-- 🔐 LOGIN PROTECTION (ADDED) -->
<script src="auth.js"></script>
<script>protectPage();</script>

<div class="panel">

  <!-- 🔐 LOGOUT BUTTON (ADDED) -->
  <button onclick="logout()" style="background:#dc3545;margin-bottom:15px;">
    Logout
  </button>

  <h2>Update Shipment Status</h2>

  <input id="trackingNumber" placeholder="Tracking Number">

  <select id="status">
    <option>Shipment Created</option>
    <option>Picked Up</option>
    <option>In Transit</option>
    <option>Arrived at Facility</option>
    <option>Customs Clearance</option>
    <option>Out for Delivery</option>
    <option>Delivered</option>
    <option>On Hold</option>
  </select>

  <input id="location" placeholder="Scan Location (City / Hub)">
  <textarea id="remark" placeholder="Remarks (optional)"></textarea>

  <button onclick="updateShipment()">Update Shipment</button>

  <div id="result"></div>
</div>

<script>

/* =========================================================
   SECURITY TOKEN LOADER (ADDED ONLY)
   ========================================================= */

const ADMIN_TOKEN = sessionStorage.getItem("brx_admin_token");


const SCRIPT_URL = "https://blueroute-api-production-aaef.up.railway.app/api/admin/update-shipment";

function updateShipment() {

  const payload = {
    trackingNumber: document.getElementById("trackingNumber").value,
    status: document.getElementById("status").value,
    location: document.getElementById("location").value,
    remark: document.getElementById("remark").value
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    headers:{
      "Content-Type":"application/json",
      "authorization": ADMIN_TOKEN
    },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      document.getElementById("result").innerHTML =
        "✅ Shipment Updated Successfully";
    } else {
      document.getElementById("result").innerHTML =
        "❌ " + data.message;
    }
  })
  .catch(err => alert("Update failed"));
}

/* =========================================================
   SECURITY UPGRADE — ADMIN SESSION VALIDATION
   (ADDED ONLY — ORIGINAL CODE ABOVE NOT MODIFIED)
   ========================================================= */

async function verifyUpdatePanelAccess(){

try{

const response = await fetch(
"https://blueroute-api-production-aaef.up.railway.app/api/admin/session-check",
{
method:"GET",
headers:{
"Content-Type":"application/json"
}
}
);

if(!response.ok){
alert("Unauthorized admin access.");
window.location.href="login.html";
}

}catch(error){
console.warn("Admin verification failed");
}

}

verifyUpdatePanelAccess();

</script>

</body>
</html>
