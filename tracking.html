<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BlueRoute Tracking</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:40px;
}

/* HEADER ALIGNMENT WITH HOMEPAGE */

header{
background:white;
border-bottom:1px solid #eee;
}

.container.nav{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1100px;
margin:auto;
padding:15px;
}

.logo{
font-size:22px;
font-weight:700;
color:#0077ff;
letter-spacing:.4px;
cursor:pointer;
}

#mainNav{
display:flex;
gap:25px;
}

#mainNav a{
text-decoration:none;
font-weight:600;
color:#222;
}

#mainNav a:hover{
color:#0077ff;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
color:#003399;
}

.summary{
margin-bottom:30px;
padding:15px;
background:#f1f4ff;
border-radius:8px;
}

.progress{
display:flex;
justify-content:space-between;
margin:30px 0;
position:relative;
}

.progress:before{
content:"";
position:absolute;
top:12px;
left:0;
width:100%;
height:4px;
background:#ddd;
z-index:0;
}

.step{
position:relative;
z-index:1;
text-align:center;
flex:1;
}

.circle{
width:25px;
height:25px;
border-radius:50%;
background:#ddd;
margin:auto;
margin-bottom:5px;
}

.active .circle{
background:#003399;
}

.step-label{
font-size:12px;
}

.timeline{
border-left:3px solid #003399;
padding-left:20px;
margin-top:30px;
}

.event{
margin-bottom:25px;
position:relative;
}

.event:before{
content:"";
width:12px;
height:12px;
background:#003399;
border-radius:50%;
position:absolute;
left:-27px;
top:4px;
}

.event-location{
font-weight:bold;
}

.event-time{
color:#777;
font-size:13px;
}

input{
padding:10px;
width:250px;
}

button{
padding:10px 15px;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<div class="container nav">

<a href="index.html"><div class="logo">BlueRoute Express</div></a>

<nav id="mainNav">

<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="tracking.html">Tracking</a>
<a href="contact.html" class="btn">Contact</a>
<a href="portal.html">Customer Portal</a>

</nav>

</div>

</header>

<br>

<div class="container">

<h1>Track Shipment</h1>

<input id="trackingInput" placeholder="Enter tracking number">
<button onclick="track()">Track</button>

<div id="result"></div>

</div>

<script>

const API="https://blueroute-api-production-e23a.up.railway.app";

const steps=[
"Shipment Created",
"Dispatched",
"In Transit",
"Customs",
"Out for Delivery",
"Delivered"
];

async function track(){

const number=document.getElementById("trackingInput").value.trim();

if(!number){
return;
}

const res=await fetch(API+"/api/track/"+number);
const data=await res.json();

const result=document.getElementById("result");

if(!data.found){
result.innerHTML="<p>Shipment not found</p>";
return;
}

const shipment=data.shipment;
const scans=data.scan_history;

/* PROGRESS BAR */

let progressHTML='<div class="progress">';

let activeIndex=steps.indexOf(shipment.status);

steps.forEach((step,i)=>{

progressHTML+=`
<div class="step ${i<=activeIndex?'active':''}">
<div class="circle"></div>
<div class="step-label">${step}</div>
</div>
`;

});

progressHTML+='</div>';

/* TIMELINE */

let timeline="";

scans.forEach(scan=>{

timeline+=`
<div class="event">
<div class="event-location">${scan.location}</div>
<div>${scan.remark}</div>
<div class="event-time">${new Date(scan.scanned_at).toLocaleString()}</div>
</div>
`;

});

result.innerHTML=`

<div class="summary">

<p><strong>Tracking:</strong> ${shipment.tracking_number}</p>

<p><strong>Status:</strong> ${shipment.status}</p>

<p><strong>Route:</strong> ${shipment.origin} → ${shipment.destination}</p>

</div>

${progressHTML}

<h3>Shipment Timeline</h3>

<div class="timeline">
${timeline}
</div>

`;

}

/* AUTO LOAD FROM URL */

const params=new URLSearchParams(window.location.search);
const tracking=params.get("track");

if(tracking){

document.getElementById("trackingInput").value=tracking;
track();

}

</script>

</body>
</html>
