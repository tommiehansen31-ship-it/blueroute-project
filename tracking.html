<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BlueRoute Tracking</title>

<!-- LEAFLET MAP LIBRARY -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:40px;
}

/* HEADER */

header{
background:white;
border-bottom:1px solid #eee;
}

.container.nav{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1100px;
margin:auto;
padding:15px;
}

.logo{
font-size:22px;
font-weight:700;
color:#0077ff;
letter-spacing:.4px;
cursor:pointer;
}

#mainNav{
display:flex;
gap:25px;
}

#mainNav a{
text-decoration:none;
font-weight:600;
color:#222;
}

#mainNav a:hover{
color:#0077ff;
}

/* MAIN CONTAINER */

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
color:#003399;
}

/* SEARCH */

.search-box{
margin-bottom:25px;
}

input{
padding:10px;
width:260px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 15px;
cursor:pointer;
background:#003399;
color:white;
border:none;
border-radius:4px;
}

/* SUMMARY CARD */

.summary{
margin-bottom:30px;
padding:20px;
background:#f1f4ff;
border-radius:8px;
}

.summary-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:10px;
}

.label{
font-size:12px;
color:#666;
}

.value{
font-size:16px;
font-weight:600;
}

/* PROGRESS BAR */

.progress{
display:flex;
justify-content:space-between;
margin:30px 0;
position:relative;
}

.progress:before{
content:"";
position:absolute;
top:12px;
left:0;
width:100%;
height:4px;
background:#ddd;
z-index:0;
}

.step{
position:relative;
z-index:1;
text-align:center;
flex:1;
}

.circle{
width:25px;
height:25px;
border-radius:50%;
background:#ddd;
margin:auto;
margin-bottom:5px;
}

.active .circle{
background:#003399;
}

.step-label{
font-size:12px;
}

/* MAP CARD */

.map-card{
background:#fafbff;
padding:20px;
border-radius:8px;
margin-top:25px;
}

#shipmentMap{
height:400px;
width:100%;
border-radius:8px;
}

/* TIMELINE CARD */

.timeline-card{
background:#fafbff;
padding:20px;
border-radius:8px;
margin-top:25px;
}

.timeline{
border-left:3px solid #003399;
padding-left:20px;
margin-top:20px;
}

.event{
margin-bottom:25px;
position:relative;
}

.event:before{
content:"";
width:12px;
height:12px;
background:#003399;
border-radius:50%;
position:absolute;
left:-27px;
top:4px;
}

.event-location{
font-weight:bold;
}

.event-time{
color:#777;
font-size:13px;
}

</style>
</head>

<body>

<header>

<div class="container nav">

<a href="index.html"><div class="logo">BlueRoute Express</div></a>

<nav id="mainNav">

<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="tracking.html">Tracking</a>
<a href="contact.html">Contact</a>
<a href="portal.html">Customer Portal</a>

</nav>

</div>

</header>

<br>

<div class="container">

<h1>Track Shipment</h1>

<div class="search-box">
<input id="trackingInput" placeholder="Enter tracking number">
<button onclick="track()">Track</button>
</div>

<div id="result"></div>

</div>

<script>

const API="https://blueroute-api-production-e23a.up.railway.app";

const steps=[
"Shipment Created",
"Dispatched",
"In Transit",
"Arrival",
"Customs",
"Out for Delivery",
"Delivered"
];

async function track(){

const number=document.getElementById("trackingInput").value.trim();

if(!number){
return;
}

const res=await fetch(API+"/api/track/"+number);
const data=await res.json();

const result=document.getElementById("result");

if(!data.found){
result.textContent="Shipment not found";
return;
}

const shipment=data.shipment;
const scans=data.scan_history;

/* CURRENT LOCATION */

let currentLocation = shipment.origin;

if(scans && scans.length > 0){
currentLocation = scans[0].location;
}

/* PROGRESS BAR */

let progressHTML='<div class="progress">';

let activeIndex=steps.indexOf(shipment.status);

steps.forEach((step,i)=>{

progressHTML+=`
<div class="step ${i<=activeIndex?'active':''}">
<div class="circle"></div>
<div class="step-label">${step}</div>
</div>
`;

});

progressHTML+='</div>';

/* TIMELINE */

let timeline="";

const timelineContainer = document.createElement("div");

scans.forEach(scan=>{

const event = document.createElement("div");
event.className="event";

const location = document.createElement("div");
location.className="event-location";
location.textContent = scan.location;

const remark = document.createElement("div");
remark.textContent = scan.remark;

const time = document.createElement("div");
time.className="event-time";
time.textContent = new Date(scan.scanned_at).toLocaleString();

event.appendChild(location);
event.appendChild(remark);
event.appendChild(time);

timelineContainer.appendChild(event);

});

timeline = timelineContainer.innerHTML;

result.innerHTML=`

<div class="summary">

<strong>Shipment Summary</strong>

<div class="summary-grid">

<div>
<div class="label">Tracking</div>
<div class="value">${shipment.tracking_number}</div>
</div>

<div>
<div class="label">Status</div>
<div class="value">${shipment.status}</div>
</div>

<div>
<div class="label">Origin</div>
<div class="value">${shipment.origin}</div>
</div>

<div>
<div class="label">Destination</div>
<div class="value">${shipment.destination}</div>
</div>

</div>

</div>

${progressHTML}

<div class="map-card">

<h3>Shipment Location</h3>

<div id="shipmentMap"></div>

</div>

<div class="timeline-card">

<h3>Shipment Timeline</h3>

<div class="timeline">
${timeline}
</div>

</div>

`;

setTimeout(()=>{
loadShipmentMap(shipment.origin,shipment.destination,currentLocation);
},300);

}

/* GEOCODER */

async function geocodeLocation(place){

try{

const res=await fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(place),{
headers:{
"User-Agent":"BlueRoute Logistics Tracking System"
}
})

const data=await res.json();

if(!data.length) return null;

return[
parseFloat(data[0].lat),
parseFloat(data[0].lon)
];

}catch(e){
return null;
}

}

/* MAP */

async function loadShipmentMap(origin,destination,current){

try{

const originCoords=await geocodeLocation(origin);
const destinationCoords=await geocodeLocation(destination);
const currentCoords=await geocodeLocation(current);

if(!originCoords || !destinationCoords) return;

const map=L.map('shipmentMap').setView(originCoords,3);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map);

/* ORIGIN */

L.marker(originCoords).addTo(map).bindPopup("Origin: "+origin);

/* DESTINATION */

L.marker(destinationCoords).addTo(map).bindPopup("Destination: "+destination);

/* CURRENT */

if(currentCoords){

const movingMarker = L.marker(originCoords,{
icon:L.icon({
iconUrl:'https://maps.google.com/mapfiles/ms/icons/green-dot.png',
iconSize:[32,32]
})
}).addTo(map);

movingMarker.bindPopup("Shipment in transit");

let progress = 0;

const interval = setInterval(()=>{

progress += 0.02;

const lat =
originCoords[0] +
(destinationCoords[0] - originCoords[0]) * progress;

const lng =
originCoords[1] +
(destinationCoords[1] - originCoords[1]) * progress;

movingMarker.setLatLng([lat,lng]);

if(progress >= 1){
clearInterval(interval);
}

},200);

}

}catch(e){

console.error("Map failed",e);

}

}

/* AUTO LOAD */

const params=new URLSearchParams(window.location.search);
const tracking=params.get("track");

if(tracking){

document.getElementById("trackingInput").value=tracking;
track();

}

</script>

</body>
</html>
