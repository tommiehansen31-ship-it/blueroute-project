<!DOCTYPE html>
<html>
<head>
<title>Track Shipment - BlueRoute Express</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
width:70%;
padding:12px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

.result-card{
margin-top:25px;
padding:20px;
border:1px solid #eee;
border-radius:8px;
background:#fafafa;
}

.status{
font-weight:bold;
color:#007bff;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Track Your Shipment</h2>

<input id="trackingInput" placeholder="Enter Tracking Number">
<button onclick="trackShipment()">Track</button>

<div id="result"></div>

</div>

<script>

const API="https://blueroute-api-production-e23a.up.railway.app";

async function trackShipment(){

const tracking=document.getElementById("trackingInput").value;

if(!tracking){
alert("Enter tracking number");
return;
}

try{

const response=await fetch(API+"/api/track/"+tracking);

const data=await response.json();

if(!data.found){

document.getElementById("result").innerHTML="<p>Tracking number not found.</p>";
return;

}

const shipment=data.shipment;

document.getElementById("result").innerHTML=`

<div class="result-card">

<h3>${shipment.tracking_number}</h3>

<div class="status">${shipment.status}</div>

<p><strong>Origin:</strong> ${shipment.origin}</p>

<p><strong>Destination:</strong> ${shipment.destination}</p>

<p><strong>Last Updated:</strong> ${new Date(shipment.last_updated).toLocaleString()}</p>

</div>

`;

}catch(err){

document.getElementById("result").innerHTML="<p>Tracking service unavailable.</p>";

}

}

</script>

</body>
</html>
