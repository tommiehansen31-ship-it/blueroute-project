<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BlueRoute Tracking</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
color:#003399;
}

.summary{
margin-bottom:30px;
padding:15px;
background:#f1f4ff;
border-radius:8px;
}

.timeline{
border-left:3px solid #003399;
padding-left:20px;
margin-top:20px;
}

.event{
margin-bottom:25px;
position:relative;
}

.event:before{
content:"";
width:12px;
height:12px;
background:#003399;
border-radius:50%;
position:absolute;
left:-27px;
top:4px;
}

.event-location{
font-weight:bold;
}

.event-time{
color:#777;
font-size:13px;
}

input{
padding:10px;
width:250px;
}

button{
padding:10px 15px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Track Shipment</h1>

<input id="trackingInput" placeholder="Enter tracking number">
<button onclick="track()">Track</button>

<div id="result"></div>

</div>

<script>

const API="https://blueroute-api-production-e23a.up.railway.app";

async function track(){

const number=document.getElementById("trackingInput").value.trim();

if(!number){
return;
}

const res=await fetch(API+"/api/track/"+number);
const data=await res.json();

const result=document.getElementById("result");

if(!data.found){
result.innerHTML="<p>Shipment not found</p>";
return;
}

const shipment=data.shipment;
const scans=data.scan_history;

let timeline="";

scans.forEach(scan=>{

timeline+=`
<div class="event">
<div class="event-location">${scan.location}</div>
<div>${scan.remark}</div>
<div class="event-time">${new Date(scan.scanned_at).toLocaleString()}</div>
</div>
`;

});

result.innerHTML=`

<div class="summary">

<p><strong>Tracking:</strong> ${shipment.tracking_number}</p>

<p><strong>Status:</strong> ${shipment.status}</p>

<p><strong>Route:</strong> ${shipment.origin} → ${shipment.destination}</p>

</div>

<h3>Shipment Timeline</h3>

<div class="timeline">
${timeline}
</div>

`;

}

/* Auto-load tracking number from URL */

const params=new URLSearchParams(window.location.search);
const tracking=params.get("track");

if(tracking){
document.getElementById("trackingInput").value=tracking;
track();
}

</script>

</body>
</html>
