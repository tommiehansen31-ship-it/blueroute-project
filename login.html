<!DOCTYPE html>
<html>
<head>
  <title>BlueRoute Express - Admin Login</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: linear-gradient(135deg,#0d6efd,#003f88);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-card {
      background:white;
      padding:40px;
      width:350px;
      border-radius:10px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      text-align:center;
    }

    h2 {
      margin-bottom:25px;
    }

    input {
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button {
      width:100%;
      padding:12px;
      background:#0d6efd;
      color:white;
      border:none;
      border-radius:5px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover {
      background:#084298;
    }

    .error {
      color:red;
      margin-top:10px;
      font-size:14px;
    }

    .remember {
      display:flex;
      align-items:center;
      justify-content:flex-start;
      margin-bottom:15px;
      font-size:14px;
      color:#333;
    }

    .remember input {
      width:auto;
      margin-right:8px;
    }
  </style>
</head>

<body>

<div class="login-card">
  <h2>Admin Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <div class="remember">
    <input type="checkbox" id="rememberMe">
    <label for="rememberMe">Remember Me</label>
  </div>

  <button id="loginBtn" onclick="secureLogin()">Login</button>

  <div id="error" class="error"></div>
</div>

<script src="auth.js"></script>

<script>

/* ===== UPGRADE ADDED ===== */
const API_BASE = "https://blueroute-api-production-e23a.up.railway.app";

/* =========================================================
   SECURITY UPGRADE — SERVER LOGIN VALIDATION
   ========================================================= */

async function secureLogin(){

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

/* ===== UPGRADE ADDED ===== */
const loginBtn = document.getElementById("loginBtn");
loginBtn.disabled = true;

  try{

    const response = await fetch(API_BASE + "/api/admin/login",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":ADMIN_SECRET,
        "authorization":ADMIN_SECRET
      },
      body:JSON.stringify({
        username:username,
        password:password
      })
    });

    const data = await response.json();

    if(data.success){

      sessionStorage.setItem("brx_admin_token", data.token);

      window.location.href = "admin-console.html";

    }else{
      document.getElementById("error").innerText="Invalid credentials";
    }

  }catch(err){
    document.getElementById("error").innerText="Server unavailable";
  }

/* ===== UPGRADE ADDED ===== */
loginBtn.disabled = false;

}

/* =========================================================
   TOKEN RECOVERY SYSTEM
   ========================================================= */

(function(){

const storedToken = sessionStorage.getItem("brx_admin_token");

if(storedToken){
console.log("Admin token restored");
}

})();

</script>

</body>
</html>
