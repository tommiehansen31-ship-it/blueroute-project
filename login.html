<!DOCTYPE html>
<html>
<head>
<title>BlueRoute Admin Login</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0d6efd,#003f88);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#0d6efd;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn" type="button">Login</button>

<div id="error" class="error"></div>

</div>

<script>

const API = "https://blueroute-api-production-e23a.up.railway.app";

document.getElementById("loginBtn").addEventListener("click", async function(){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

try{

const response = await fetch(API + "/api/admin/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username,password})
});

const data = await response.json();

if(data.success){

sessionStorage.setItem("br_token",data.token);

window.location.href="admin-console.html";

}else{

document.getElementById("error").innerText="Invalid credentials";

}

}catch(err){

document.getElementById("error").innerText="Server error";

}

});

</script>

</body>
</html>
