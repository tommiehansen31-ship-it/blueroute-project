<!DOCTYPE html>
<html>
<head>
  <title>BlueRoute Express - Admin Login</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: linear-gradient(135deg,#0d6efd,#003f88);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-card {
      background:white;
      padding:40px;
      width:350px;
      border-radius:10px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      text-align:center;
    }

    h2 {
      margin-bottom:25px;
    }

    input {
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button {
      width:100%;
      padding:12px;
      background:#0d6efd;
      color:white;
      border:none;
      border-radius:5px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover {
      background:#084298;
    }

    .error {
      color:red;
      margin-top:10px;
      font-size:14px;
    }

    /* ✅ Added styling for Remember Me (does not affect layout) */
    .remember {
      display:flex;
      align-items:center;
      justify-content:flex-start;
      margin-bottom:15px;
      font-size:14px;
      color:#333;
    }

    .remember input {
      width:auto;
      margin-right:8px;
    }
  </style>
</head>

<body>

<div class="login-card">
  <h2>Admin Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <!-- ✅ NEW: Remember Me Checkbox -->
  <div class="remember">
    <input type="checkbox" id="rememberMe">
    <label for="rememberMe">Remember Me</label>
  </div>

  <button onclick="secureLogin()">Login</button>

  <div id="error" class="error"></div>
</div>

<!-- Uses your already-upgraded auth.js -->
<script src="auth.js"></script>

<script>

/* =========================================================
   SECURITY UPGRADE — SERVER LOGIN VALIDATION
   (ADDED ONLY — NO EXISTING CODE REMOVED)
   ========================================================= */

async function secureLogin(){

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  try{

    const response = await fetch("https://blueroute-api-production-aaef.up.railway.app/api/admin/login",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        username:username,
        password:password
      })
    });

    if(response.ok){
      login(); // calls your existing auth.js login system
    }else{
      document.getElementById("error").innerText="Invalid credentials";
    }

  }catch(err){
    document.getElementById("error").innerText="Server unavailable";
  }

}

</script>

</body>
</html>
