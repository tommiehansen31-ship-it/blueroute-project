<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Customer Portal | BlueRoute Express</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>

.portal{
padding:90px 0;
background:#f4f7fb;
min-height:100vh;
}

.portal-card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 15px 35px rgba(0,0,0,.08);
margin-bottom:25px;
}

.portal-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-top:20px;
}

.shipment-card{
padding:20px;
background:#f9fafc;
border-radius:8px;
}

.portal input{
padding:14px;
width:260px;
border:1px solid #ccc;
border-radius:6px;
margin-right:10px;
}

.portal button{
padding:14px 22px;
background:#0077ff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.remove-btn{
margin-left:10px;
background:#ff4d4d;
color:white;
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

.remove-btn:hover{
opacity:.9;
}

</style>

</head>

<body>

<div id="progress-bar"></div>

<header>
<div class="container nav">

<a href="index.html"><div class="logo">BlueRoute Express</div></a>

<nav>

<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="tracking.html">Tracking</a>
<a href="contact.html" class="btn">Contact</a>
<a href="portal.html">Customer Portal</a>

</nav>

</div>
</header>


<section class="portal">

<div class="container">

<h2>Customer Shipment Portal</h2>

<div class="portal-card">

<h3>Add Shipment</h3>

<input id="newTracking" placeholder="Enter Tracking Number">

<button onclick="saveShipment()">Save Shipment</button>

</div>


<div class="portal-card">

<h3>Your Shipments</h3>

<div id="shipmentList" class="portal-grid"></div>

</div>

</div>

</section>


<footer class="footer">
<div class="container">
© 2026 BlueRoute Express Delivery. All Rights Reserved.
</div>
</footer>


<script>

function loadShipments(){

const shipments = JSON.parse(localStorage.getItem("brx_shipments") || "[]");

const container = document.getElementById("shipmentList");

container.innerHTML="";

shipments.forEach(tracking=>{

const card=document.createElement("div");

card.className="shipment-card";

card.innerHTML=`

<h4>${tracking}</h4>

<div class="status" id="status-${tracking}">
Checking status...
</div>

<br>

<a href="tracking.html?track=${tracking}" class="btn">Track Shipment</a>

<button class="remove-btn" onclick="removeShipment('${tracking}')">
Remove
</button>

`;

container.appendChild(card);

loadShipmentStatus(tracking);

});

}

function saveShipment(){

const input=document.getElementById("newTracking");

const tracking=input.value.trim();

if(!tracking)return;

let shipments=JSON.parse(localStorage.getItem("brx_shipments") || "[]");

shipments.push(tracking);

localStorage.setItem("brx_shipments",JSON.stringify(shipments));

input.value="";

loadShipments();

}

function removeShipment(tracking){

let shipments=JSON.parse(localStorage.getItem("brx_shipments") || "[]");

shipments=shipments.filter(t=>t!==tracking);

localStorage.setItem("brx_shipments",JSON.stringify(shipments));

loadShipments();

}

loadShipments();

async function loadShipmentStatus(tracking){

try{

const API="https://blueroute-api-production-e23a.up.railway.app";

const res=await fetch(API+"/api/track/"+tracking);

const data=await res.json();

const statusBox=document.getElementById("status-"+tracking);

if(!statusBox)return;

if(!data.found){

statusBox.innerHTML="Shipment not found";

return;

}

statusBox.innerHTML="Status: "+data.shipment.status;

}catch(err){

console.error(err);

}

}


/* =========================================================
   🔐 LOCAL STORAGE PROTECTION (UPGRADE ADDED)
   Prevents corrupted shipment data
   ========================================================= */

(function(){

try{

const data = JSON.parse(localStorage.getItem("brx_shipments") || "[]");

if(!Array.isArray(data)){
localStorage.setItem("brx_shipments","[]");
}

}catch(e){

localStorage.setItem("brx_shipments","[]");

}

})();


/* =========================================================
   🔐 DUPLICATE SHIPMENT PREVENTION (UPGRADE ADDED)
   ========================================================= */

(function(){

const originalSave = saveShipment;

window.saveShipment = function(){

const input=document.getElementById("newTracking");

const tracking=input.value.trim();

if(!tracking)return;

let shipments=JSON.parse(localStorage.getItem("brx_shipments") || "[]");

if(shipments.includes(tracking)){
alert("Shipment already saved.");
return;
}

originalSave();

}

})();


/* =========================================================
   🔗 AUTO TRACKING LINK HANDLER (UPGRADE ADDED)
   If portal opened with ?track=XXXX it auto-saves
   ========================================================= */

(function(){

const params=new URLSearchParams(window.location.search);

const track=params.get("track");

if(track){

let shipments=JSON.parse(localStorage.getItem("brx_shipments") || "[]");

if(!shipments.includes(track)){

shipments.push(track);

localStorage.setItem("brx_shipments",JSON.stringify(shipments));

}

}

})();


/* =========================================================
   🚀 AUTO REFRESH TRACKING CARDS (UPGRADE ADDED)
   ========================================================= */

(function(){

const cards=document.querySelectorAll(".shipment-card a");

cards.forEach(link=>{

link.addEventListener("click",function(){

const track=this.href.split("track=")[1];

if(track){

let shipments=JSON.parse(localStorage.getItem("brx_shipments") || "[]");

if(!shipments.includes(track)){

shipments.push(track);

localStorage.setItem("brx_shipments",JSON.stringify(shipments));

}

}

});

});

})();

</script>

</body>
</html>
