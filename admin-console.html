<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BlueRoute Admin Console</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f7fb;
}

header{
background:#0a3d91;
color:white;
padding:15px;
font-size:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav{
background:#ffffff;
padding:10px;
border-bottom:1px solid #ddd;
}

nav button{
margin-right:10px;
padding:8px 12px;
cursor:pointer;
}

section{
padding:20px;
display:none;
}

section.active{
display:block;
}

input, textarea{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
}

table th, table td{
border:1px solid #ddd;
padding:8px;
}

</style>
</head>

<body>

<script src="auth.js"></script>

<header>
BlueRoute Admin Console

<button onclick="logout()" style="background:#dc3545;color:white;border:none;padding:8px 12px;cursor:pointer;">
Logout
</button>

</header>

<nav>
<button onclick="showSection('create')">Create Shipment</button>
<button onclick="showSection('list')">All Shipments</button>
<button onclick="showSection('update')">Update Status</button>
</nav>


<!-- CREATE SHIPMENT -->

<section id="create" class="active">

<h2>Create Shipment</h2>

<form id="createShipmentForm">

<h3>Sender Information</h3>
<input id="senderName" placeholder="Sender Name">
<input id="senderAddress" placeholder="Sender Address">
<input id="senderPhone" placeholder="Sender Phone">
<input id="senderEmail" placeholder="Sender Email">

<h3>Receiver Information</h3>
<input id="receiverName" placeholder="Receiver Name">
<input id="receiverAddress" placeholder="Receiver Address">
<input id="receiverPhone" placeholder="Receiver Phone">
<input id="receiverEmail" placeholder="Receiver Email">

<h3>Shipment Route</h3>
<input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination">

<h3>Shipment Details</h3>
<input id="shipmentName" placeholder="Shipment Name / Description">
<input id="weight" placeholder="Weight (kg)">
<input id="itemsSent" placeholder="Items Sent">
<input id="boxCount" placeholder="Number of Boxes">

<label>Package Sent Date</label>
<input type="date" id="sentDate">

<label>Estimated Delivery Date</label>
<input type="date" id="estimatedDelivery">

<textarea id="remarks" placeholder="Remarks"></textarea>

<button type="submit">Create Shipment</button>

</form>

<div id="result"></div>

</section>


<!-- SHIPMENT LIST -->

<section id="list">

<h2>Shipment List</h2>

<table>

<thead>
<tr>
<th>Tracking</th>
<th>Origin</th>
<th>Destination</th>
<th>Status</th>
</tr>
</thead>

<tbody id="shipmentTable"></tbody>

</table>

</section>


<!-- UPDATE SHIPMENT -->

<section id="update">

<h2>Update Shipment Status</h2>

<input id="updateTracking" placeholder="Tracking Number">

<select id="statusSelect">
<option>Shipment Created</option>
<option>Dispatched</option>
<option>In Transit</option>
<option>Customs</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

<button onclick="updateShipment()">Update</button>

</section>

<script src="admin-console.js"></script>

<script>

function showSection(section){

document.querySelectorAll("section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(section).classList.add("active")

}

</script>

</body>
</html>
