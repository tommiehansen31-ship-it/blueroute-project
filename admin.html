<!DOCTYPE html>
<html>
<head>
<title>BlueRoute Express Admin</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.panel{
max-width:700px;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ccc;
}

button{
background:#007bff;
color:white;
border:none;
padding:14px;
width:100%;
font-size:16px;
cursor:pointer;
}

#result{
margin-top:20px;
font-weight:bold;
color:green;
}

</style>

</head>

<body>

<script src="auth.js"></script>

<div class="panel">

<button onclick="logout()" style="background:#dc3545;margin-bottom:15px;">
Logout
</button>

<h2>Create Shipment</h2>

<input id="senderName" placeholder="Sender Name">
<input id="senderEmail" placeholder="Sender Email">

<input id="receiverName" placeholder="Receiver Name">
<input id="receiverEmail" placeholder="Receiver Email">

<input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination">

<button onclick="createShipment()">Create Shipment</button>

<div id="result"></div>

</div>

<script>

const API="https://blueroute-api-production-e23a.up.railway.app";

async function createShipment(){

const token=sessionStorage.getItem("br_token");

const payload={
senderName:senderName.value,
senderEmail:senderEmail.value,
receiverName:receiverName.value,
receiverEmail:receiverEmail.value,
origin:origin.value,
destination:destination.value
};

const res=await fetch(API+"/api/admin/create-shipment",{
method:"POST",
headers:{
"Content-Type":"application/json",
authorization:token
},
body:JSON.stringify(payload)
});

const data=await res.json();

if(data.success){

result.innerHTML="Shipment created: "+data.trackingNumber;

}else{

alert("Creation failed");

}

}

</script>

</body>
</html>
